<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSC Enterprises</title>
    <style>
      :root {
        --bg: #06003c;
        --text: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Inter, "Avenir Next", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .page {
        height: 100vh;
        width: 100vw;
        display: grid;
        grid-template-rows: 1fr auto 1fr;
        place-items: center;
        padding: clamp(24px, 4vh, 48px) 28px;
      }

      .top {
        align-self: start;
        text-align: center;
      }

      .logo {
        width: clamp(320px, 34vw, 560px);
        max-width: 82vw;
        height: auto;
        filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.2));
      }

      .services {
        margin: clamp(16px, 2.3vh, 28px) 0 0;
        font-size: clamp(14px, 1.7vw, 33px);
        font-weight: 450;
        letter-spacing: 0.02em;
      }

      .middle {
        text-align: center;
        font-size: clamp(18px, 2vw, 40px);
        line-height: 1.35;
        font-weight: 400;
      }

      .email {
        opacity: 0.9;
      }

      .footer {
        align-self: end;
        text-align: center;
        font-size: clamp(16px, 1.75vw, 32px);
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="top">
        <img class="logo" src="LOGORSC1.png" alt="RSC Enterprises logo" />
        <p class="services">Distressed Assets | Special Situations | Private Capital</p>
      </section>

      <section class="middle">
        <div>Pragmatic analysis, data-backed decisions.</div>
        <div class="email">info@rsc-enteprises.ciaoit</div>
      </section>

      <footer class="footer">Italian Operations - RSC Enterprises</footer>
    </main>
  </body>
</html>
