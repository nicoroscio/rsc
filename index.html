<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSC Enterprises</title>
    <style>
      :root {
        --bg-start: #04002a;
        --bg-end: #12085d;
        --text: #f6f8ff;
        --muted: #c7ceff;
        --card-border: rgba(255, 255, 255, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 15%, rgba(118, 92, 255, 0.42), transparent 42%),
          radial-gradient(circle at 82% 78%, rgba(0, 183, 255, 0.23), transparent 48%),
          linear-gradient(150deg, var(--bg-start), var(--bg-end));
        color: var(--text);
        font-family: Inter, "Avenir Next", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        padding: clamp(20px, 3vw, 36px);
      }

      .page {
        width: min(960px, 100%);
        min-height: min(88vh, 760px);
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: clamp(18px, 2.6vh, 30px);
        padding: clamp(24px, 4vw, 44px);
        border-radius: 30px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04));
        border: 1px solid var(--card-border);
        box-shadow: 0 20px 45px rgba(2, 0, 35, 0.45);
        backdrop-filter: blur(16px);
      }

      .top,
      .middle,
      .footer {
        text-align: center;
      }

      .logo {
        width: clamp(220px, 26vw, 360px);
        max-width: 74vw;
        height: auto;
        filter: drop-shadow(0 10px 22px rgba(0, 0, 0, 0.35));
      }

      .services {
        margin: clamp(12px, 2vh, 20px) 0 0;
        font-size: clamp(12px, 1.15vw, 16px);
        font-weight: 500;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .middle {
        align-self: center;
        display: grid;
        gap: 10px;
      }

      .message {
        margin: 0;
        font-size: clamp(16px, 1.5vw, 24px);
        line-height: 1.45;
        font-weight: 500;
      }

      .email {
        margin: 0;
        font-size: clamp(13px, 1vw, 16px);
        color: var(--muted);
        letter-spacing: 0.03em;
      }

      .footer {
        align-self: end;
        font-size: clamp(12px, 0.95vw, 14px);
        color: rgba(241, 245, 255, 0.82);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      @media (max-width: 700px) {
        .page {
          border-radius: 22px;
          min-height: 85vh;
        }

        .services {
          letter-spacing: 0.06em;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="top">
        <img class="logo" src="assets/LOGORSC1.png" alt="RSC Enterprises logo" />
        <p class="services">Distressed Assets | Special Situations | Private Capital</p>
      </section>

      <section class="middle">
        <p class="message">Pragmatic analysis, data-backed decisions.</p>
        <p class="email">info@rsc-enterprises.it</p>
      </section>

      <footer class="footer">Italian Operations • RSC Enterprises</footer>
    </main>
  </body>
</html>
